<!DOCTYPE html>
<html>
<head>
    <title>MCC Research Explorer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header">
    <img src="/static/logo.png" alt="WCM Logo" class="logo">
    <h1>MCC Research Explorer</h1>
</div>

<div class="search-section">
    <input type="text" id="searchBox" placeholder="Search publications by keyword, e.g. cancer">
    <button onclick="search()">Search</button>
</div>

<div class="search-section">
    <input type="text" id="nameBox" placeholder="Search researcher by name, e.g. Smith">
    <button onclick="searchName()">Search Name</button>
</div>

<div id="results" style="margin-top:30px;"></div>

<script src="/static/app.js"></script>

</body>
</html>
